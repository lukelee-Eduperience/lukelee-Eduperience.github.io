<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>數學小先鋒：合 24 巔峰對抗賽</title>
    <!-- 使用 Tailwind CSS 進行現代化 UI 設計 -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .num-btn { @apply bg-blue-500 text-white font-bold py-4 px-6 rounded-2xl text-3xl shadow-lg transform active:scale-95 transition-all hover:bg-blue-600; }
        .op-btn { @apply bg-gray-100 text-gray-700 font-bold py-3 px-5 rounded-xl text-xl shadow-sm transform active:scale-95 transition-all hover:bg-gray-200 border-b-4 border-gray-300; }
        .display-area { min-height: 100px; @apply border-4 border-indigo-100 rounded-3xl flex items-center justify-center text-3xl font-mono mb-6 bg-indigo-50 text-indigo-900 shadow-inner px-4 text-center; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes pulse-green { 0%, 100% { background-color: #10B981; transform: scale(1); } 50% { background-color: #059669; transform: scale(1.02); } }
        .animate-start { animation: pulse-green 2s infinite; }
        .leaderboard-item { @apply flex justify-between p-3 rounded-xl mb-2 transition-all transform hover:translate-x-1; }
    </style>
</head>
<body class="bg-indigo-50 min-h-screen flex items-center justify-center p-4">

    <div id="game-container" class="w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border-8 border-white">
        <!-- 頂部資訊列 -->
        <div class="bg-indigo-600 p-5 text-white flex justify-between items-center">
            <div class="flex items-center gap-2">
                <span class="text-indigo-200">⏳</span>
                <span id="timer" class="font-black text-2xl tracking-tighter">60</span><span class="text-xs ml-1 text-indigo-200 font-bold">秒</span>
            </div>
            <div class="bg-indigo-500 px-4 py-1 rounded-full flex items-center gap-2">
                <span class="text-indigo-200 text-xs font-bold uppercase">Score</span>
                <span id="score" class="font-black text-2xl tracking-tighter">0</span>
            </div>
        </div>

        <div class="p-8">
            <!-- 1. 準備畫面 -->
            <div id="setup-view" class="text-center py-6">
                <div class="text-7xl mb-6">🎯</div>
                <h1 class="text-3xl font-black mb-2 text-indigo-900">數學小先鋒</h1>
                <h2 class="text-xl font-bold mb-6 text-indigo-400">合 24 巔峰對抗賽</h2>
                <div class="bg-yellow-50 p-4 rounded-2xl mb-8 text-sm text-yellow-700 leading-relaxed border border-yellow-100">
                    💡 使用四個數字各一次，湊成 24。<br>
                    越多、越快答對，分數越高！
                </div>
                <button id="start-btn" class="w-full bg-green-500 text-white py-5 rounded-2xl font-black text-2xl shadow-xl hover:bg-green-600 transition-all disabled:opacity-50 animate-start" disabled>
                    正在連接伺服器...
                </button>
            </div>

            <!-- 2. 遊戲主畫面 -->
            <div id="play-view" class="hidden">
                <div class="display-area" id="expression-display">請點擊數字開始</div>
                
                <!-- 數字區域 -->
                <div class="grid grid-cols-2 gap-4 mb-8" id="number-buttons">
                    <!-- JS 生成 -->
                </div>

                <!-- 運算子區域 -->
                <div class="grid grid-cols-4 gap-3 mb-8">
                    <button class="op-btn" onclick="window.addOp('+')">+</button>
                    <button class="op-btn" onclick="window.addOp('-')">−</button>
                    <button class="op-btn" onclick="window.addOp('*')">×</button>
                    <button class="op-btn" onclick="window.addOp('/')">÷</button>
                    <button class="op-btn" onclick="window.addOp('(')">(</button>
                    <button class="op-btn" onclick="window.addOp(')')">)</button>
                    <button class="op-btn bg-red-50 text-red-500 border-red-200" onclick="window.clearExpr()">C</button>
                    <button class="op-btn bg-indigo-600 text-white border-indigo-700" onclick="window.checkAnswer()">OK</button>
                </div>
                
                <div class="h-6 text-center">
                    <span id="feedback" class="text-sm font-bold"></span>
                </div>
            </div>

            <!-- 3. 結算與排行榜 -->
            <div id="end-view" class="hidden text-center">
                <div class="text-5xl mb-4">🏆</div>
                <h2 class="text-3xl font-black text-indigo-900 mb-1">挑戰結束！</h2>
                <p class="text-gray-400 mb-6">你的實力已經被記錄在英雄榜上</p>
                
                <div class="bg-indigo-600 text-white rounded-3xl p-6 mb-8 shadow-lg">
                    <span class="text-indigo-200 text-xs font-bold uppercase block mb-1">Final Score</span>
                    <span id="final-score" class="text-5xl font-black">0</span>
                </div>
                
                <div id="submit-section" class="mb-8">
                    <input type="text" id="player-name" maxlength="10" placeholder="輸入你的名字" class="w-full p-4 border-2 border-indigo-100 rounded-2xl mb-4 text-center text-xl font-bold outline-none focus:border-indigo-500 transition-all shadow-sm">
                    <button id="submit-btn" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl hover:bg-indigo-700 shadow-lg">上傳成績</button>
                </div>
                
                <div class="text-left">
                    <div class="flex justify-between items-end mb-4 px-1">
                        <h3 class="font-black text-indigo-900 text-xl">全班排行榜</h3>
                        <span class="text-xs text-indigo-400 font-bold">TOP 10</span>
                    </div>
                    <ul id="leaderboard" class="max-h-64 overflow-y-auto no-scrollbar pb-4">
                        <!-- 排行榜資料 -->
                    </ul>
                </div>
                
                <button onclick="location.reload()" class="mt-4 text-indigo-400 font-bold hover:text-indigo-600 transition-colors text-sm">再玩一次 ↺</button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK 導入 (模組化版本) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- 你的 Firebase 配置 ---
        const firebaseConfig = {
            apiKey: "AIzaSyAJW-S7RYFI20hkx8qaKQVgWH6JSUHwwSE",
            authDomain: "make-24-fe999.firebaseapp.com",
            projectId: "make-24-fe999",
            storageBucket: "make-24-fe999.firebasestorage.app",
            messagingSenderId: "520606824699",
            appId: "1:520606824699:web:0e3cbf309b80b531cd985e",
            measurementId: "G-VHMVS7HEHV",
            databaseURL: "https://make-24-fe999-default-rtdb.asia-southeast1.firebasedatabase.app/" 
        };

        // 初始化 Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const database = getDatabase(app);

        // 安全路徑
        const dbPath = `artifacts/make-24-fe999/public/data/leaderboard`;

        let currentNumbers = [];
        let usedIndices = new Set();
        let expression = [];
        let score = 0;
        let timeLeft = 60;
        let gameActive = false;
        let questionStartTime = 0;
        let currentUser = null;

        // 身份驗證
        const initAuth = async () => {
            try {
                const result = await signInAnonymously(auth);
                currentUser = result.user;
                const startBtn = document.getElementById('start-btn');
                startBtn.innerText = "開始挑戰！";
                startBtn.disabled = false;
                startBtn.onclick = startGame;
            } catch (error) {
                console.error("Firebase Error:", error);
                document.getElementById('start-btn').innerText = "連線失敗，請重整";
            }
        };

        initAuth();

        function startGame() {
            document.getElementById('setup-view').classList.add('hidden');
            document.getElementById('play-view').classList.remove('hidden');
            gameActive = true;
            nextQuestion();
            startTimer();
        }

        function nextQuestion() {
            currentNumbers = Array.from({length: 4}, () => Math.floor(Math.random() * 9) + 1);
            window.clearExpr();
            questionStartTime = Date.now();
        }

        function renderButtons() {
            const container = document.getElementById('number-buttons');
            container.innerHTML = '';
            currentNumbers.forEach((num, idx) => {
                const btn = document.createElement('button');
                const isUsed = usedIndices.has(idx);
                btn.className = `num-btn ${isUsed ? 'opacity-20 bg-gray-300 shadow-none scale-90' : ''}`;
                btn.innerText = num;
                btn.disabled = isUsed;
                btn.onclick = () => addNumber(num, idx);
                container.appendChild(btn);
            });
        }

        function addNumber(num, idx) {
            usedIndices.add(idx);
            expression.push(num);
            renderButtons();
            updateDisplay();
        }

        window.addOp = (op) => {
            expression.push(op);
            updateDisplay();
        };

        window.clearExpr = () => {
            expression = [];
            usedIndices.clear();
            renderButtons();
            updateDisplay();
            showFeedback("");
        };

        function updateDisplay() {
            document.getElementById('expression-display').innerText = expression.join(' ') || '下一個動作？';
        }

        function showFeedback(msg, isError = true) {
            const f = document.getElementById('feedback');
            f.innerText = msg;
            f.className = isError ? "text-sm font-bold text-red-500" : "text-sm font-bold text-green-500";
        }

        window.checkAnswer = () => {
            if (usedIndices.size !== 4) {
                showFeedback("⚠️ 必須用完四個數字！");
                return;
            }
            try {
                const exprString = expression.join('').replace(/×/g, '*').replace(/÷/g, '/');
                const result = new Function(`return (${exprString})`)();
                
                if (Math.abs(result - 24) < 0.0001) {
                    const timeTaken = (Date.now() - questionStartTime) / 1000;
                    let timeBonus = 0;
                    if (timeTaken < 10) timeBonus = Math.floor((10 - timeTaken) * 10);
                    
                    score += (100 + timeBonus);
                    document.getElementById('score').innerText = score;
                    showFeedback("✨ 答對了！+ " + (100 + timeBonus), false);
                    setTimeout(nextQuestion, 500);
                } else {
                    showFeedback("❌ 目前結果是 " + result + "，不是 24 哦");
                }
            } catch (e) {
                showFeedback("⚠️ 算式錯誤，請清空重按");
            }
        };

        function startTimer() {
            const timerInterval = setInterval(() => {
                if (!gameActive) { clearInterval(timerInterval); return; }
                timeLeft--;
                document.getElementById('timer').innerText = timeLeft;
                if (timeLeft <= 0) { clearInterval(timerInterval); endGame(); }
            }, 1000);
        }

        function endGame() {
            gameActive = false;
            document.getElementById('play-view').classList.add('hidden');
            document.getElementById('end-view').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            document.getElementById('submit-btn').onclick = submitScore;
            loadLeaderboard();
        }

        async function submitScore() {
            const name = document.getElementById('player-name').value.trim() || "匿名小先鋒";
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.innerText = "正在上傳成績...";

            try {
                await push(ref(database, dbPath), {
                    name: name,
                    score: score,
                    timestamp: Date.now(),
                    uid: currentUser.uid
                });
                document.getElementById('submit-section').innerHTML = `<p class="text-green-500 font-bold py-4">✅ 成績已安全同步到雲端排行榜！</p>`;
            } catch (error) {
                btn.disabled = false;
                btn.innerText = "上傳失敗，再試一次";
            }
        }

        function loadLeaderboard() {
            onValue(ref(database, dbPath), (snapshot) => {
                const list = document.getElementById('leaderboard');
                list.innerHTML = '';
                const data = snapshot.val();
                if (!data) {
                    list.innerHTML = '<li class="text-center text-gray-400 py-4 italic text-sm">暫無排名數據</li>';
                    return;
                }

                const items = Object.values(data);
                items.sort((a, b) => b.score - a.score || a.timestamp - b.timestamp);

                items.slice(0, 10).forEach((item, index) => {
                    const li = document.createElement('li');
                    li.className = `leaderboard-item ${index === 0 ? 'bg-yellow-50 border-2 border-yellow-200' : 'bg-white border border-gray-100'}`;
                    li.innerHTML = `
                        <span class="flex items-center gap-3">
                            <span class="w-8 h-8 flex items-center justify-center rounded-full ${index === 0 ? 'bg-yellow-400 text-white' : 'bg-indigo-100 text-indigo-700'} font-black text-sm">${index + 1}</span>
                            <span class="font-bold text-gray-700">${item.name}</span>
                        </span>
                        <span class="font-black text-indigo-600">${item.score} <span class="text-[10px] text-indigo-300 font-normal">PTS</span></span>
                    `;
                    list.appendChild(li);
                });
            });
        }
    </script>
</body>
</html>
