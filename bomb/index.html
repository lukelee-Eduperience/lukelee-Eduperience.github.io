<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>💣 20炸彈挑戰賽</title>
    <style>
        body { font-family: '微軟正黑體', sans-serif; text-align: center; background-color: #f7f9fc; padding: 20px; }
        #game-container { max-width: 500px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .bomb-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; margin: 25px 0; justify-items: center; }
        .bomb { font-size: 40px; transition: all 0.3s ease; }
        .bomb.removed { opacity: 0; transform: scale(0); }
        .controls button { padding: 12px 20px; font-size: 18px; cursor: pointer; border: none; border-radius: 10px; background-color: #e67e22; color: white; margin: 5px; }
        .controls button:disabled { background-color: #bdc3c7; cursor: not-allowed; }
        .setup-section { background: #ecf0f1; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        select { padding: 8px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; margin: 10px; }
        .status-box { font-size: 1.2em; font-weight: bold; margin: 15px 0; color: #2c3e50; }
        .log { color: #7f8c8d; font-style: italic; min-height: 24px; }
        .win-msg { color: #c0392b; font-size: 1.5em; margin-top: 10px; }
    </style>
</head>
<body>

<div id="game-container">
    <h1>💣 20 炸彈大挑戰</h1>
    
    <div id="setup">
        <div class="setup-section">
            <div>
                <label>遊戲模式：</label>
                <select id="mode" onchange="toggleOrderSelect()">
                    <option value="pve">對戰電腦 (PvE)</option>
                    <option value="pvp">朋友對戰 (PvP)</option>
                </select>
            </div>
            <div id="order-select-area">
                <label>誰先開始：</label>
                <select id="first-player">
                    <option value="player">我先 (玩家1)</option>
                    <option value="computer">電腦先 (玩家2)</option>
                </select>
            </div>
        </div>
        <button onclick="startGame()" style="padding: 15px 30px; background: #27ae60; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px;">開始遊戲</button>
    </div>

    <div id="game-area" style="display:none;">
        <div class="bomb-grid" id="bombGrid"></div>
        <div class="status-box" id="statusText">剩餘炸彈：20</div>
        <div class="controls" id="moveControls">
            <button onclick="handleMove(1)">拿 1 個</button>
            <button onclick="handleMove(2)">拿 2 個</button>
            <button onclick="handleMove(3)">拿 3 個</button>
        </div>
        <p class="log" id="actionLog"></p>
        <button onclick="resetToMenu()" style="background: none; border: 1px solid #ccc; color: #95a5a6; margin-top: 20px; cursor: pointer;">返回主選單</button>
    </div>
</div>

<script>
    let bombs = 20;
    let isPvE = true;
    let turn = ""; // "player1" 或 "player2"

    function toggleOrderSelect() {
        const mode = document.getElementById('mode').value;
        const orderArea = document.getElementById('order-select-area');
        const orderSelect = document.getElementById('first-player');
        
        if (mode === 'pvp') {
            orderArea.style.display = 'none';
        } else {
            orderArea.style.display = 'block';
            orderSelect.options[0].text = "我先";
            orderSelect.options[1].text = "電腦先";
        }
    }

    function startGame() {
        bombs = 20;
        isPvE = document.getElementById('mode').value === 'pve';
        const first = document.getElementById('first-player').value;
        
        turn = (isPvE && first === 'computer') ? "player2" : "player1";
        
        document.getElementById('setup').style.display = 'none';
        document.getElementById('game-area').style.display = 'block';
        
        updateDisplay();
        
        if (isPvE && turn === "player2") {
            setTimeout(computerMove, 800);
        }
    }

    function updateDisplay() {
        const grid = document.getElementById('bombGrid');
        grid.innerHTML = '';
        for (let i = 0; i < 20; i++) {
            const div = document.createElement('div');
            div.className = 'bomb' + (i >= bombs ? ' removed' : '');
            div.innerText = '💣';
            grid.appendChild(div);
        }
        
        let name = (turn === "player1") ? "玩家 1" : (isPvE ? "電腦" : "玩家 2");
        document.getElementById('statusText').innerText = `剩餘炸彈：${bombs} | 輪到：${name}`;
        
        // 限制按鈕
        const btns = document.getElementById('moveControls').getElementsByTagName('button');
        for (let i = 0; i < 3; i++) {
            btns[i].disabled = (i + 1 > bombs) || (isPvE && turn === "player2");
        }
    }

    function handleMove(count) {
        if (count > bombs) return;
        executeMove(count);
    }

    function executeMove(count) {
        let name = (turn === "player1") ? "玩家 1" : (isPvE ? "電腦" : "玩家 2");
        document.getElementById('actionLog').innerText = `${name} 拿走了 ${count} 個炸彈。`;
        
        bombs -= count;
        
        if (bombs === 0) {
            updateDisplay();
            setTimeout(() => {
                alert(`💥 砰！${name} 輸了！`);
                resetToMenu();
            }, 100);
            return;
        }

        turn = (turn === "player1") ? "player2" : "player1";
        updateDisplay();

        if (isPvE && turn === "player2") {
            setTimeout(computerMove, 800);
        }
    }

    function computerMove() {
        // 必勝邏輯 (4n + 1): 1, 5, 9, 13, 17
        let target = (bombs - 1) % 4;
        let move = target === 0 ? 1 : target; 
        executeMove(move);
    }

    function resetToMenu() {
        document.getElementById('setup').style.display = 'block';
        document.getElementById('game-area').style.display = 'none';
        document.getElementById('actionLog').innerText = '';
    }
</script>
</body>
</html>
